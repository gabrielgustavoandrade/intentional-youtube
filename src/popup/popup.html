<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      color-scheme: light dark;
      --bg: #f2f2f7;
      --group: #ffffff;
      --text: #000000;
      --secondary: rgba(60, 60, 67, 0.6);
      --separator: rgba(60, 60, 67, 0.29);
      --control-fill: rgba(120, 120, 128, 0.24);
      --green: #34c759;
      --blue: #007aff;
      --switch-on: var(--green);
      --focus: rgba(0, 122, 255, 0.28);
    }

    html,
    body {
      width: 320px;
      min-height: 326px;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    select,
    input {
      font: inherit;
    }

    .app {
      padding: 14px 12px 12px;
    }

    .title {
      margin: 0 2px 10px;
      font-size: 17px;
      line-height: 1.15;
      font-weight: 650;
      letter-spacing: 0;
    }

    .group {
      overflow: hidden;
      margin-bottom: 10px;
      border-radius: 10px;
      background: var(--group);
    }

    .row {
      position: relative;
      display: flex;
      min-height: 42px;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 10px 7px 13px;
    }

    .row:has(.detail) {
      min-height: 50px;
    }

    .row + .row::before {
      content: '';
      position: absolute;
      top: 0;
      left: 13px;
      right: 0;
      height: 1px;
      background: var(--separator);
      transform: scaleY(0.5);
      transform-origin: top;
    }

    .row-main {
      min-width: 0;
    }

    .label {
      display: block;
      color: var(--text);
      font-size: 13.5px;
      line-height: 1.18;
      font-weight: 400;
      letter-spacing: 0;
    }

    .detail {
      display: block;
      margin-top: 2px;
      overflow: hidden;
      color: var(--secondary);
      font-size: 11.5px;
      line-height: 1.18;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pip-button {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      text-align: left;
    }

    .pip-icon {
      position: relative;
      width: 26px;
      height: 26px;
      flex: 0 0 auto;
      border: 1.5px solid #8b5cf6;
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.14);
    }

    .pip-icon::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 8px solid #8b5cf6;
      transform: translate(-36%, -50%);
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 22px;
      flex: 0 0 auto;
    }

    .toggle input {
      position: absolute;
      inset: 0;
      opacity: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: var(--control-fill);
      cursor: pointer;
      transition: background 0.16s ease;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow:
        0 2px 5px rgba(0, 0, 0, 0.18),
        0 1px 1px rgba(0, 0, 0, 0.06);
      transition: transform 0.16s cubic-bezier(0.28, 0.8, 0.32, 1);
    }

    .toggle input:checked + .slider {
      background: var(--switch-on);
    }

    .toggle input:checked + .slider::before {
      transform: translateX(14px);
    }

    .select-wrap {
      position: relative;
      display: flex;
      max-width: 142px;
      flex: 0 0 auto;
      align-items: center;
    }

    .select-wrap::after {
      content: '';
      position: absolute;
      right: 1px;
      width: 7px;
      height: 7px;
      border-right: 1.5px solid var(--secondary);
      border-bottom: 1.5px solid var(--secondary);
      pointer-events: none;
      transform: rotate(45deg) translateY(-2px);
    }

    select {
      width: 142px;
      max-width: 142px;
      padding: 0 16px 0 0;
      border: 0;
      background: transparent;
      color: var(--secondary);
      font-size: 13.5px;
      line-height: 1.18;
      text-align: right;
      cursor: pointer;
      appearance: none;
    }

    .status {
      min-height: 0;
      margin: -6px 2px 10px;
      color: var(--secondary);
      font-size: 11px;
      line-height: 1.25;
    }

    .status:empty {
      display: none;
    }

    .reload-banner {
      display: none;
      margin: -2px 0 0;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fff3cd;
      color: #7a4f00;
      font-size: 12px;
      text-align: center;
      cursor: pointer;
    }

    .reload-banner.visible {
      display: block;
    }

    .pip-button:focus-visible,
    select:focus-visible,
    .toggle input:focus-visible + .slider,
    .reload-banner:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --group: #2c2c2e;
        --text: #ffffff;
        --secondary: rgba(235, 235, 245, 0.6);
        --separator: rgba(84, 84, 88, 0.65);
        --control-fill: rgba(120, 120, 128, 0.32);
        --switch-on: var(--blue);
      }

      .reload-banner {
        background: #3a2e13;
        color: #ffd87a;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Intentional YouTube controls">
    <h1 class="title">Intentional YouTube</h1>

    <section class="group">
      <button class="pip-button row" id="toggle-pip" type="button">
        <span class="row-main">
          <span class="label">Picture in Picture</span>
          <span class="detail">Float video</span>
        </span>
        <span class="pip-icon" aria-hidden="true"></span>
      </button>
    </section>

    <div class="status" id="pip-status" role="status" aria-live="polite"></div>

    <section class="group">
      <div class="row">
        <span class="row-main">
          <label class="label" for="redirectHome">Hide Home</label>
        </span>
        <label class="toggle">
          <input type="checkbox" id="redirectHome">
          <span class="slider"></span>
        </label>
      </div>

      <div class="row" id="redirect-target-row">
        <label class="label" for="redirectTarget">Redirect to</label>
        <span class="select-wrap">
          <select id="redirectTarget">
            <option value="subscriptions">Subscriptions</option>
            <option value="watch-later">Watch Later</option>
            <option value="library">Library</option>
          </select>
        </span>
      </div>
    </section>

    <section class="group">
      <div class="row">
        <span class="row-main">
          <label class="label" for="hideShorts">Hide Shorts</label>
        </span>
        <label class="toggle">
          <input type="checkbox" id="hideShorts">
          <span class="slider"></span>
        </label>
      </div>

      <div class="row">
        <span class="row-main">
          <label class="label" for="hideDistractions">Hide Distractions</label>
          <span class="detail">Recommendations, autoplay</span>
        </span>
        <label class="toggle">
          <input type="checkbox" id="hideDistractions">
          <span class="slider"></span>
        </label>
      </div>

      <div class="row">
        <span class="row-main">
          <label class="label" for="monkMode">Monk Mode</label>
          <span class="detail">Subs, search, channels</span>
        </span>
        <label class="toggle">
          <input type="checkbox" id="monkMode">
          <span class="slider"></span>
        </label>
      </div>
    </section>

    <div class="reload-banner" id="reload-banner">Reload YouTube tabs</div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
